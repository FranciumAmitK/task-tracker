<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Tracker — Live</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f0;
    --muted: #6b7280;
    --accent: #22c55e;
    --accent-dim: rgba(34,197,94,0.12);
    --red: #ef4444;
    --amber: #f59e0b;
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.12);
    --radius: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  /* Ambient glow */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(34,197,94,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }

  /* Header */
  header { margin-bottom: 2.5rem; }
  .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .dot-live {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100%{ box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
    50%{ box-shadow: 0 0 0 5px rgba(34,197,94,0); }
  }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .subtitle { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .stat-val.green { color: var(--accent); }
  .stat-val.amber { color: var(--amber); }
  .stat-val.red   { color: var(--red); }

  /* Add bar */
  .add-bar {
    display: flex; gap: 8px; margin-bottom: 1rem;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 8px;
  }
  .add-bar input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 0 8px;
  }
  .add-bar input::placeholder { color: var(--muted); }
  .add-bar select {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 12px; padding: 0 8px;
    outline: none; cursor: pointer; height: 34px;
  }
  .add-bar select option { background: #1e2026; }
  .add-btn {
    height: 34px; padding: 0 16px;
    background: var(--accent); color: #000; font-weight: 600; font-size: 13px;
    border: none; border-radius: 8px; cursor: pointer; white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
  }
  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.97); }

  /* Filters */
  .filters { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .f-btn {
    height: 28px; padding: 0 12px; border-radius: 999px;
    border: 0.5px solid var(--border); background: transparent;
    color: var(--muted); font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .f-btn:hover { border-color: var(--border2); color: var(--text); }
  .f-btn.active {
    background: var(--accent-dim); border-color: rgba(34,197,94,0.4);
    color: var(--accent);
  }

  /* Save indicator */
  .save-row {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 1rem; font-size: 11px; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); transition: background 0.3s; }
  .sdot.saving { background: var(--amber); }

  /* Task list */
  #task-list { display: flex; flex-direction: column; gap: 6px; }

  .task-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 11px 14px;
    transition: border-color 0.2s, opacity 0.2s;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .task-item:hover { border-color: var(--border2); }
  .task-item.done { opacity: 0.45; }

  .chk {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--border2); flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .chk.checked { background: var(--accent); border-color: var(--accent); }
  .chk svg { display: none; }
  .chk.checked svg { display: block; }

  .task-text {
    flex: 1; font-size: 14px; color: var(--text); cursor: pointer;
    word-break: break-word; line-height: 1.4;
  }
  .task-text.done { text-decoration: line-through; color: var(--muted); }

  .edit-input {
    flex: 1; background: var(--surface2); border: 0.5px solid var(--border2);
    border-radius: 6px; color: var(--text); font-size: 14px;
    font-family: 'DM Sans', sans-serif; padding: 4px 8px; outline: none;
  }

  .task-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .pri {
    font-size: 10px; padding: 3px 8px; border-radius: 999px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .pri-high { background: rgba(239,68,68,0.12); color: #ef4444; }
  .pri-mid  { background: rgba(245,158,11,0.12); color: #f59e0b; }
  .pri-low  { background: rgba(34,197,94,0.12);  color: #22c55e; }

  .ts { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .del-btn {
    width: 26px; height: 26px; border-radius: 6px; border: none;
    background: transparent; color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    transition: background 0.15s, color 0.15s;
  }
  .del-btn:hover { background: rgba(239,68,68,0.1); color: var(--red); }

  .empty {
    text-align: center; padding: 3rem 0;
    color: var(--muted); font-size: 14px;
  }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }

  .config-banner {
    background: rgba(59,130,246,0.08); border: 0.5px solid rgba(59,130,246,0.25);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 1.5rem;
    font-size: 13px; color: #93c5fd; line-height: 1.6;
  }
  .config-banner a { color: #60a5fa; }
  .config-banner code {
    background: rgba(255,255,255,0.06); padding: 1px 6px;
    border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 12px;
  }

  @media (max-width: 500px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .ts { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-row">
      <div class="dot-live"></div>
      <h1>Task Tracker</h1>
    </div>
    <div class="subtitle">live · synced · shared</div>
  </header>

  <!-- CONFIG BANNER — hidden after setup -->
  <div class="config-banner" id="config-banner">
    ⚙️ <strong>Setup required:</strong> Replace the Firebase config below in the <code>&lt;script&gt;</code> section with your own project values.
    <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> → New project → Realtime Database → Start in test mode → Copy config.
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">Pending</div><div class="stat-val amber" id="s-pending">—</div></div>
    <div class="stat"><div class="stat-label">Done</div><div class="stat-val green" id="s-done">—</div></div>
    <div class="stat"><div class="stat-label">High pri</div><div class="stat-val red" id="s-high">—</div></div>
  </div>

  <div class="add-bar">
    <input id="task-input" type="text" placeholder="What needs to be done?" />
    <select id="pri-select">
      <option value="high">🔴 High</option>
      <option value="mid" selected>🟡 Mid</option>
      <option value="low">🟢 Low</option>
    </select>
    <button class="add-btn" id="add-btn">+ Add</button>
  </div>

  <div class="filters">
    <button class="f-btn active" data-f="all">All</button>
    <button class="f-btn" data-f="pending">Pending</button>
    <button class="f-btn" data-f="done">Done</button>
    <button class="f-btn" data-f="high">High priority</button>
  </div>

  <div class="save-row">
    <div class="sdot" id="sdot"></div>
    <span id="save-lbl">connected</span>
  </div>

  <div id="task-list"></div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove, update }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBtF_nyemHJL0oJ0Qum-wofGQtMRQAfG3Y",
  authDomain: "task-tracker-2e76d.firebaseapp.com",
  databaseURL: "https://task-tracker-2e76d-default-rtdb.firebaseio.com",
  projectId: "task-tracker-2e76d",
  storageBucket: "task-tracker-2e76d.firebasestorage.app",
  messagingSenderId: "604165582298",
  appId: "1:604165582298:web:1e1d859e8098fb35ea64e3",
  measurementId: "G-MRV2K5RGMX"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const tasksRef = ref(db, 'tasks');

  let tasks = {};
  let filter = 'all';
  let editingId = null;

  function setSave(saving) {
    const dot = document.getElementById('sdot');
    const lbl = document.getElementById('save-lbl');
    dot.className = 'sdot' + (saving ? ' saving' : '');
    lbl.textContent = saving ? 'syncing...' : 'synced · live';
  }

  // Real-time listener — updates whenever DB changes
  onValue(tasksRef, snapshot => {
    tasks = snapshot.val() || {};
    render();
    setSave(false);
    document.getElementById('config-banner').style.display = 'none';
  }, err => {
    document.getElementById('save-lbl').textContent = 'connection error — check config';
    document.getElementById('sdot').style.background = '#ef4444';
  });

  window.addTask = function() {
    const inp = document.getElementById('task-input');
    const pri = document.getElementById('pri-select').value;
    const text = inp.value.trim();
    if (!text) return;
    const id = 't_' + Date.now();
    setSave(true);
    set(ref(db, 'tasks/' + id), {
      id, text, priority: pri, done: false,
      created: new Date().toLocaleString('en-IN', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'short' })
    });
    inp.value = '';
  };

  window.toggleTask = function(id) {
    setSave(true);
    update(ref(db, 'tasks/' + id), { done: !tasks[id].done });
  };

  window.deleteTask = function(id) {
    setSave(true);
    remove(ref(db, 'tasks/' + id));
  };

  window.startEdit = function(id) {
    editingId = id; render();
    const el = document.getElementById('edit-' + id);
    if (el) { el.focus(); el.select(); }
  };

  window.saveEdit = function(id, val) {
    if (val.trim()) {
      setSave(true);
      update(ref(db, 'tasks/' + id), { text: val.trim() });
    }
    editingId = null; render();
  };

  window.setFilter = function(f, btn) {
    filter = f;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };

  function render() {
    const all = Object.values(tasks).sort((a,b) => {
      const ai = a.id||'', bi = b.id||'';
      return bi.localeCompare(ai);
    });

    document.getElementById('s-total').textContent   = all.length;
    document.getElementById('s-pending').textContent = all.filter(t=>!t.done).length;
    document.getElementById('s-done').textContent    = all.filter(t=>t.done).length;
    document.getElementById('s-high').textContent    = all.filter(t=>t.priority==='high').length;

    const filtered = all.filter(t => {
      if (filter==='pending') return !t.done;
      if (filter==='done')    return t.done;
      if (filter==='high')    return t.priority==='high';
      return true;
    });

    const list = document.getElementById('task-list');
    if (!filtered.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">✓</div>Nothing here — add a task above</div>';
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-item${t.done?' done':''}" data-id="${t.id}">
        <div class="chk${t.done?' checked':''}" onclick="toggleTask('${t.id}')">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 4L3.5 6.5L9 1" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        ${editingId===t.id
          ? `<input class="edit-input" id="edit-${t.id}" value="${(t.text||'').replace(/"/g,'&quot;')}"
               onblur="saveEdit('${t.id}',this.value)"
               onkeydown="if(event.key==='Enter')saveEdit('${t.id}',this.value);if(event.key==='Escape'){window._cancelEdit();}" />`
          : `<span class="task-text${t.done?' done':''}" ondblclick="startEdit('${t.id}')">${t.text||''}</span>`
        }
        <div class="task-meta">
          <span class="pri pri-${t.priority||'mid'}">${t.priority||'mid'}</span>
          <span class="ts">${t.created||''}</span>
          <button class="del-btn" onclick="deleteTask('${t.id}')" title="Delete">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
              <path d="M2 3.5h10M5.5 3.5V2.5h3v1M3.5 3.5l.5 8h6l.5-8"/>
            </svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  window._cancelEdit = function() { editingId = null; render(); };

  document.getElementById('add-btn').onclick = window.addTask;
  document.getElementById('task-input').addEventListener('keydown', e => { if(e.key==='Enter') window.addTask(); });
  document.querySelectorAll('.f-btn').forEach(btn => {
    btn.onclick = () => window.setFilter(btn.dataset.f, btn);
  });
</script>
</body>
</html>
